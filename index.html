<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter</title>

  <!-- Google Fonts: Poppins for headings, Inter for body/UI text -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Decorative ambient background blobs (purely visual, hidden from AT) -->
  <div class="bg-blob bg-blob--one" aria-hidden="true"></div>
  <div class="bg-blob bg-blob--two" aria-hidden="true"></div>

  <main class="page">
    <section class="card" aria-labelledby="app-title">

      <!-- Header -->
      <header class="card__header">
        <span class="icon icon--thermometer" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 14.76V4.5a2 2 0 0 0-4 0v10.26a4 4 0 1 0 4 0Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <circle class="icon__bulb" cx="12" cy="17" r="2.3" fill="currentColor"/>
            <path class="icon__mercury" d="M12 15V8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <h1 id="app-title">Temperature Converter</h1>
        <p class="card__subtitle">Convert between Celsius, Fahrenheit &amp; Kelvin instantly</p>
      </header>

      <!-- Conversion form -->
      <form class="form" id="converter-form" novalidate>

        <div class="field">
          <label for="temp-value">Temperature</label>
          <input
            type="number"
            id="temp-value"
            name="temp-value"
            placeholder="Enter a value"
            inputmode="decimal"
            step="any"
            aria-describedby="error-message"
          />
        </div>

        <div class="field-row">
          <div class="field">
            <label for="from-unit">Convert From</label>
            <select id="from-unit" name="from-unit">
              <option value="C" selected>Celsius (°C)</option>
              <option value="F">Fahrenheit (°F)</option>
              <option value="K">Kelvin (K)</option>
            </select>
          </div>

          <button type="button" id="swap-btn" class="swap-btn" aria-label="Swap units">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 7h11l-3-3M17 17H6l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <div class="field">
            <label for="to-unit">Convert To</label>
            <select id="to-unit" name="to-unit">
              <option value="C">Celsius (°C)</option>
              <option value="F" selected>Fahrenheit (°F)</option>
              <option value="K">Kelvin (K)</option>
            </select>
          </div>
        </div>

        <!-- Error message region, announced to assistive tech -->
        <p class="error-message" id="error-message" role="alert" aria-live="assertive"></p>

        <div class="button-row">
          <button type="submit" class="btn btn--primary" id="convert-btn">Convert</button>
          <button type="button" class="btn btn--ghost" id="reset-btn">Reset</button>
        </div>
      </form>

      <!-- Result card -->
      <div class="result-card" id="result-card" hidden>
        <span class="icon icon--result" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3v9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="12" cy="17" r="3.5" stroke="currentColor" stroke-width="1.6"/>
            <path d="M9 7l3-3 3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <div class="result-card__text">
          <span class="result-card__label">Result</span>
          <span class="result-card__value" id="result-value">—</span>
        </div>
      </div>

    </section>

    <footer class="page-footer">
      <p>Developed by Harshita Chauhan</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
